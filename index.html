<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Workshopen har flyttat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; color: #411B38; background: #FFF6F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { max-width: 560px; background: white; border-radius: 18px; padding: 56px 48px; box-shadow: 0 4px 24px rgba(65, 27, 56, 0.08); border: 1px solid rgba(65, 27, 56, 0.06); text-align: center; }
        h1 { font-size: 32px; font-weight: 700; line-height: 1.15; letter-spacing: -0.005em; margin-bottom: 20px; color: #411B38; }
        p { font-size: 17px; line-height: 1.6; color: #411B38; margin-bottom: 18px; }
        a { color: #C87C5C; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
        .muted { color: #7A4864; font-size: 15px; margin-top: 32px; }
        @media (max-width: 540px) {
            .card { padding: 40px 28px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Den här kursen har flyttat</h1>
        <p>"Kom igång med Claude Code"-materialet ligger nu på en lösenordsskyddad sida för anmälda deltagare.</p>
        <p>Är du anmäld? Du har fått inloggningsuppgifter via mejl.</p>
        <p>Vill du delta i en kommande workshop? Hör av dig via <a href="https://pauspling.com">pauspling.com</a>.</p>
        <p class="muted">— Paulina Modlitba</p>
    </div>
</body>
</html>
